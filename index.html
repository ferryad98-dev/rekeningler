<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEK REKENING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .result-box { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen">
    <div class="max-w-5xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg">💰</div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tight">CEK REKENING</h1>
                    <p class="text-emerald-400 text-sm">Cek saldo &amp; nama rekening instan</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-gray-800 text-xs px-4 py-2 rounded-3xl border border-gray-700">
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                <span class="font-medium">API Siap • Balance tersisa</span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-700 mb-8">
            <button onclick="switchTab(0)" id="tab-bank" class="tab-button flex-1 md:flex-none px-8 py-4 font-semibold text-lg border-b-4 border-emerald-500 text-emerald-400">🏦 Rekening Bank</button>
            <button onclick="switchTab(1)" id="tab-ewallet" class="tab-button flex-1 md:flex-none px-8 py-4 font-semibold text-lg border-b-4 border-transparent hover:text-emerald-400">📱 E-Wallet</button>
        </div>

        <div class="grid md:grid-cols-12 gap-8">
            <!-- Form -->
            <div class="md:col-span-5 bg-gray-900/70 border border-gray-700 rounded-3xl p-8 shadow-2xl">
                <!-- BANK FORM -->
                <div id="form-bank">
                    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-building-columns"></i> Cek Rekening Bank</h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Pilih Bank</label>
                            <select id="bank-select" class="w-full bg-gray-800 border border-gray-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-lg outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Nomor Rekening</label>
                            <input id="bank-account" type="text" placeholder="1985708071" class="w-full bg-gray-800 border border-gray-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-lg outline-none font-mono">
                        </div>
                        <button onclick="cekBank()" class="w-full bg-emerald-500 hover:bg-emerald-600 transition-colors text-white font-semibold text-xl py-5 rounded-3xl flex items-center justify-center gap-3 shadow-lg">
                            🔎 CEK REKENING
                        </button>
                    </div>
                </div>

                <!-- EWALLET FORM -->
                <div id="form-ewallet" class="hidden">
                    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-wallet"></i> Cek E-Wallet</h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Pilih E-Wallet</label>
                            <select id="ewallet-select" class="w-full bg-gray-800 border border-gray-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-lg outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Nomor Handphone</label>
                            <input id="ewallet-account" type="text" placeholder="081322700084" class="w-full bg-gray-800 border border-gray-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-lg outline-none font-mono">
                        </div>
                        <button onclick="cekEwallet()" class="w-full bg-emerald-500 hover:bg-emerald-600 transition-colors text-white font-semibold text-xl py-5 rounded-3xl flex items-center justify-center gap-3 shadow-lg">
                            🔎 CEK E-WALLET
                        </button>
                    </div>
                </div>
            </div>

            <!-- Result -->
            <div class="md:col-span-7">
                <div id="result-area" class="hidden bg-gray-900/70 border border-gray-700 rounded-3xl p-8 shadow-2xl min-h-[420px]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-semibold">Hasil Pengecekan</h3>
                        <button onclick="resetForm()" class="text-gray-400 hover:text-white flex items-center gap-1 text-sm">
                            <i class="fa-solid fa-rotate-right"></i> Reset
                        </button>
                    </div>
                    <div id="result-content" class="result-box"></div>
                </div>

                <div id="empty-state" class="bg-gray-900/30 border border-dashed border-gray-700 rounded-3xl p-12 text-center min-h-[420px] flex flex-col items-center justify-center">
                    <div class="text-7xl mb-6 opacity-30">🔎</div>
                    <h3 class="text-2xl font-medium mb-3">Siap mengecek?</h3>
                    <p class="text-gray-400 max-w-xs">Pilih jenis cek, isi data, lalu tekan tombol CEK</p>
                </div>
            </div>
        </div>

        <!-- RIWAYAT PENGECEKAN -->
        <div class="mt-12">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold flex items-center gap-2"><i class="fa-solid fa-clock"></i> Riwayat Pengecekan</h3>
                <button onclick="clearHistory()" class="text-red-400 hover:text-red-500 text-sm flex items-center gap-1">
                    <i class="fa-solid fa-trash"></i> Hapus Semua
                </button>
            </div>
            <div id="history-list" class="bg-gray-900/70 border border-gray-700 rounded-3xl p-6 space-y-3 max-h-96 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const banks = [
            {code:"014",name:"BCA"},{code:"009",name:"BNI"},{code:"002",name:"BRI"},{code:"451",name:"BSI"},
            {code:"022",name:"CIMB"},{code:"542",name:"JAGO"},{code:"213",name:"JENIUS"},{code:"008",name:"MANDIRI"},
            {code:"426",name:"MEGA"},{code:"019",name:"PANIN"},{code:"013",name:"PERMATA"},{code:"535",name:"SEABANK"},
            {code:"153",name:"SINARMAS"}
        ];

        // KODE E-WALLET YANG BARU (sudah di-update)
        const ewalletList = [
            {code:"wallet_dana", name:"DANA"},
            {code:"gopay_user", name:"GOPAY"},
            {code:"wallet_linkaja", name:"LINKAJA"},
            {code:"wallet_ovo", name:"OVO"},
            {code:"wallet_shopeepay", name:"SHOPEEPAY"}
        ];

        const API_KEY = "ckr_ec10ee996a9e476386c5ae1e7be28123";
        const API_URL = "/api/validate";

        function populateSelects() {
            const bankSelect = document.getElementById('bank-select');
            banks.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.code;
                opt.textContent = `${b.code} - ${b.name}`;
                bankSelect.appendChild(opt);
            });

            const ewSelect = document.getElementById('ewallet-select');
            ewalletList.forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.code;
                opt.textContent = e.name;
                ewSelect.appendChild(opt);
            });
        }

        let currentTab = 0;
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-button').forEach((btn, i) => {
                if (i === tab) btn.classList.add('border-emerald-500', 'text-emerald-400');
                else btn.classList.remove('border-emerald-500', 'text-emerald-400');
            });
            document.getElementById('form-bank').classList.toggle('hidden', tab !== 0);
            document.getElementById('form-ewallet').classList.toggle('hidden', tab === 0);
            resetForm();
        }

        async function callAPI(payload) {
            const content = document.getElementById('result-content');
            const resultArea = document.getElementById('result-area');
            const empty = document.getElementById('empty-state');
            
            content.innerHTML = `<div class="flex flex-col items-center justify-center py-16"><div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent animate-spin rounded-full mb-4"></div><p class="text-lg">Sedang mengecek...</p></div>`;
            resultArea.classList.remove('hidden');
            empty.classList.add('hidden');

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                renderResult(data, payload.type);
            } catch (e) {
                content.innerHTML = `<div class="bg-red-950 border border-red-500 rounded-2xl p-8 text-center"><i class="fa-solid fa-triangle-exclamation text-5xl text-red-400 mb-4"></i><p class="text-xl">Gagal terhubung ke API</p></div>`;
            }
        }

        function renderResult(json, type) {
            const content = document.getElementById('result-content');
            if (!json.status) {
                content.innerHTML = `<div class="bg-red-950/60 border border-red-400 rounded-2xl p-8 text-center"><p class="text-xl">${json.message || 'Gagal'}</p></div>`;
                return;
            }

            let html = `<div class="bg-emerald-900/30 border border-emerald-500/30 rounded-2xl p-6">`;
            
            if (type === "bank") {
                html += `
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <div class="text-xs uppercase text-emerald-400">BANK</div>
                            <div class="text-3xl font-bold">${json.data.bank_name}</div>
                            <div class="text-sm text-gray-400">Kode ${json.data.bank_code}</div>
                        </div>
                        <div>
                            <div class="text-xs uppercase text-emerald-400">NOMOR REKENING</div>
                            <div class="font-mono text-3xl font-bold">${json.data.account_number}</div>
                        </div>
                        <div class="col-span-2 mt-4">
                            <div class="text-xs uppercase text-emerald-400">NAMA PEMILIK</div>
                            <div class="text-3xl font-bold">${json.data.account_name}</div>
                        </div>
                    </div>`;
            } else {
                html += `
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <div class="text-xs uppercase text-emerald-400">E-WALLET</div>
                            <div class="text-3xl font-bold">${json.data.ewallet_name}</div>
                        </div>
                        <div>
                            <div class="text-xs uppercase text-emerald-400">NOMOR HP</div>
                            <div class="font-mono text-3xl font-bold">${json.data.phone_number}</div>
                        </div>
                        <div class="col-span-2 mt-4">
                            <div class="text-xs uppercase text-emerald-400">NAMA AKUN</div>
                            <div class="text-3xl font-bold">${json.data.account_name}</div>
                        </div>
                    </div>`;
            }
            html += `</div>`;
            content.innerHTML = html;

            saveToHistory(json, type);
        }

        // === RIWAYAT (tetap sama seperti sebelumnya) ===
        function saveToHistory(json, type) {
            let history = JSON.parse(localStorage.getItem('cekHistory') || '[]');
            const entry = {
                id: Date.now(),
                timestamp: new Date().toLocaleString('id-ID'),
                type: type === "bank" ? "Bank" : "E-Wallet",
                name: type === "bank" ? json.data.bank_name : json.data.ewallet_name,
                number: type === "bank" ? json.data.account_number : json.data.phone_number,
                accountName: type === "bank" ? json.data.account_name : json.data.account_name
            };
            history.unshift(entry);
            if (history.length > 8) history.pop();
            localStorage.setItem('cekHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            let history = JSON.parse(localStorage.getItem('cekHistory') || '[]');
            if (history.length === 0) {
                list.innerHTML = `<p class="text-gray-400 text-center py-8">Belum ada riwayat pengecekan</p>`;
                return;
            }
            let html = '';
            history.forEach(item => {
                html += `
                    <div class="flex justify-between items-center bg-gray-800/50 hover:bg-gray-800 rounded-2xl px-5 py-4 transition-colors">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs px-3 py-1 bg-gray-700 rounded-full">${item.type}</span>
                                <span class="text-emerald-400 font-medium">${item.name}</span>
                            </div>
                            <div class="font-mono text-lg mt-1">${item.number}</div>
                            <div class="text-sm text-gray-400">${item.accountName}</div>
                        </div>
                        <div class="text-right text-xs text-gray-400">${item.timestamp}</div>
                    </div>`;
            });
            list.innerHTML = html;
        }

        function clearHistory() {
            if (confirm('Hapus semua riwayat pengecekan?')) {
                localStorage.removeItem('cekHistory');
                renderHistory();
            }
        }

        function cekBank() {
            const code = document.getElementById('bank-select').value;
            const acc = document.getElementById('bank-account').value.trim();
            if (!code || !acc) return alert('Pilih bank dan isi nomor rekening!');
            callAPI({ type: "bank", code: code, accountNumber: acc, api_key: API_KEY });
        }

        function cekEwallet() {
            const code = document.getElementById('ewallet-select').value;
            const acc = document.getElementById('ewallet-account').value.trim();
            if (!code || !acc) return alert('Pilih e-wallet dan isi nomor HP!');
            callAPI({ type: "ewallet", code: code, accountNumber: acc, api_key: API_KEY });
        }

        function resetForm() {
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('bank-account').value = '';
            document.getElementById('ewallet-account').value = '';
        }

        window.onload = () => {
            populateSelects();
            renderHistory();
            console.log('%c✅ CEK REKENING + E-WALLET siap!', 'color:#10b981;font-weight:bold');
        };
    </script>
</body>
</html>
